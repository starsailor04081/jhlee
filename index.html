<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투운사 시험문제은행</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="shortcut icon" href="./icon.png">
  <link rel="apple-touch-icon-precomposed" href="./icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon.png">
</head>

<body>

  <div class="header">
    <div class="reset">다시풀기</div>
    <div class="header-row">
      <div class="header-label">투운사 시험문제은행</div>
      <div class="header-score">
        <div class="dot g"></div>
        <span>0</span>
        <div class="dot r"></div>
        <span>0</span>
        <div class="dot ttl"></div>
        <span>0</span>
      </div>
    </div>
    <div class="prog-track">
      <div class="prog-fill"></div>
    </div>
  </div>

  <div class="main">

    <div class="q-card">
      <div class="q-topic">TOPIC</div>
      <div class="q-text">
        문장 내용 <span class="blank">?</span> 이어지는 문장
      </div>
    </div>

    <div class="choices">
      <button class="choice">보기1</button>
      <button class="choice">보기2</button>
      <button class="choice">보기3</button>
      <button class="choice">보기4</button>
    </div>

    <div class="hint-area">
      <div class="hint-inner">
        힌트 내용
      </div>
    </div>

    <div class="actions">
      <button class="btn-hint">💡</button>
      <button class="btn-next">다음</button>
    </div>

  </div>

  <!-- <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.1.0/DragDropTouch.js"></script> -->
  <script type="module" src="./index.js"></script>
</body>

</html>
