<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단어장</title>
<link rel="stylesheet" href="./cardStyle.css">

</head>
<body>

  <!-- 최상단 리셋 버튼 -->
<div id="resetContainer" style="text-align: right; padding: 10px;">
    <button id="resetBtn" style="padding: 5px 10px; cursor: pointer; background: #ff4d4d; color: white; border: none; border-radius: 4px;">학습 기록 초기화</button>
</div>

<header>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="counter" id="counter">1 / 3</div>
</header>

<div class="stage" id="stage">
  <!-- 카드가 JS로 생성됨 -->
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-emoji" id="doneEmoji">🎉</div>
  <h2 id="doneTitle">완료!</h2>
  <button class="restart-btn" onclick="restart()">다시 풀기</button>
</div>

<div class="score-row">
  <div class="score-pill o">⭕ <span id="correctCount">0</span></div>
  <div class="score-pill x">❌ <span id="wrongCount">0</span></div>
</div>

<script type="module" src="./cardScript.js"></script>
</body>
</html>
